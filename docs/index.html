<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RailYatra - Train Route App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">R</div>
      <div>
        <h1>RailYatra</h1>
        <p>Indian Railway Search</p>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
  </header>

  <main class="app-shell">
    <section class="hero-card">
      <div>
        <p class="eyebrow">Real railway app frontend</p>
        <h2>Search trains, routes, and PNR from one clean dashboard.</h2>
        <p class="hero-copy">
          Start with a production-style frontend now, then connect live railway APIs later.
        </p>
      </div>
    </section>

    <section class="tabs">
      <button class="tab active" data-tab="between">Trains Between Stations</button>
      <button class="tab" data-tab="train">Train Schedule</button>
      <button class="tab" data-tab="pnr">PNR Status</button>
    </section>

    <section class="panel active" id="between">
      <div class="card">
        <h3>Find trains</h3>
        <div class="form-grid">
          <div>
            <label for="fromStation">From station</label>
            <input id="fromStation" type="text" placeholder="e.g. MAS" />
          </div>
          <div>
            <label for="toStation">To station</label>
            <input id="toStation" type="text" placeholder="e.g. SBC" />
          </div>
          <div>
            <label for="travelDate">Travel date</label>
            <input id="travelDate" type="date" />
          </div>
        </div>
        <button class="primary-btn" id="searchTrainsBtn">Search trains</button>
      </div>
      <div class="results" id="betweenResults"></div>
    </section>

    <section class="panel" id="train">
      <div class="card">
        <h3>Train schedule</h3>
        <div class="form-grid single">
          <div>
            <label for="trainNumber">Train number</label>
            <input id="trainNumber" type="text" placeholder="e.g. 12627" />
          </div>
        </div>
        <button class="primary-btn" id="searchScheduleBtn">Get schedule</button>
      </div>
      <div class="results" id="scheduleResults"></div>
    </section>

    <section class="panel" id="pnr">
      <div class="card">
        <h3>PNR status</h3>
        <div class="form-grid single">
          <div>
            <label for="pnrNumber">PNR number</label>
            <input id="pnrNumber" type="text" placeholder="Enter 10-digit PNR" />
          </div>
        </div>
        <button class="primary-btn" id="checkPnrBtn">Check PNR</button>
      </div>
      <div class="results" id="pnrResults"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
